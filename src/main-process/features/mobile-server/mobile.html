<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <title>Open Cluely</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #1c2128;
      --border:       #30363d;
      --text:         #e6edf3;
      --text-muted:   #8b949e;
      --blue:         #58a6ff;
      --blue-dim:     #1c2a4a;
      --blue-border:  #264f78;
      --green:        #3fb950;
      --red:          #f85149;
      --purple:       #bc8cff;
      --yellow:       #d29922;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* dynamic viewport height for mobile browsers */
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      transition: all 0.3s;
    }

    .status-pill.connected {
      color: var(--green);
      border-color: rgba(63, 185, 80, 0.3);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-pill.connected .status-dot { background: var(--green); }

    /* ── Messages ────────────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .messages:empty::after {
      content: 'No messages yet.\nTake a screenshot or start the mic.';
      display: block;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin: auto;
      white-space: pre-line;
      line-height: 1.8;
    }

    /* Message types */
    .msg { display: flex; flex-direction: column; }
    .msg.center { align-items: center; }
    .msg.left  { align-items: flex-start; max-width: 88%; }
    .msg.right { align-items: flex-end;   align-self: flex-end; max-width: 88%; }

    .msg-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .msg.right .msg-label { color: var(--blue); text-align: right; }

    .msg-bubble {
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    /* System */
    .msg.center .msg-bubble {
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      padding: 3px 8px;
    }

    /* Transcript */
    .msg.left .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Partial transcript */
    .msg.left.partial .msg-bubble {
      background: var(--surface2);
      border-color: var(--border);
      border-style: dashed;
      color: var(--text-muted);
      font-style: italic;
    }

    /* AI response */
    .msg.right .msg-bubble {
      background: var(--blue-dim);
      border: 1px solid var(--blue-border);
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    /* Streaming cursor */
    .streaming .msg-bubble::after {
      content: '▋';
      color: var(--blue);
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input area ──────────────────────────────────────────────────────── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .context-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 38px;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    .context-input::placeholder { color: var(--text-muted); }
    .context-input:focus { border-color: var(--blue); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--blue);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }

    .send-btn:active { opacity: 0.7; }

    .send-btn svg { width: 18px; height: 18px; }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 8px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s;
      min-width: 68px;
    }

    .tool-btn:active { background: var(--border); }

    .tool-btn svg {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }

    .tool-btn .btn-label {
      font-size: 11px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .tool-btn.screenshot svg { color: var(--blue); }
    .tool-btn.ask-ai     svg { color: var(--purple); }
    .tool-btn.mic        svg { color: var(--text-muted); transition: color 0.2s; }
    .tool-btn.clear      svg { color: var(--text-muted); }

    .tool-btn.mic.active svg        { color: var(--red); }
    .tool-btn.mic.active .btn-label { color: var(--red); }

    /* Screenshot badge */
    .ss-badge {
      position: absolute;
      top: 4px;
      right: 6px;
      background: var(--blue);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 10px;
      padding: 0 4px;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .ss-badge.show { display: flex; }

    /* Mic pulse animation when active */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(248, 81, 73, 0); }
    }

    .tool-btn.mic.active {
      animation: pulse 1.5s ease-in-out infinite;
      border-radius: 14px;
    }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
      max-width: 82vw;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .toast.error  { border-color: rgba(248,81,73,0.4); color: #ff8080; }
    .toast.show   { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Scrollbar styling ───────────────────────────────────────────────── */
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">✦</div>
      <span class="header-title">Open Cluely</span>
    </div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <div class="status-dot"></div>
        <span id="statusText">Connecting</span>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      class="context-input"
      id="contextInput"
      placeholder="Type a question or context for AI…"
      rows="1"
    ></textarea>
    <button class="send-btn" onclick="askAi()" title="Ask AI">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">

    <button class="tool-btn screenshot" id="btnScreenshot" onclick="takeScreenshot()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span class="btn-label">Screenshot</span>
      <div class="ss-badge" id="ssBadge">0</div>
    </button>

    <button class="tool-btn ask-ai" id="btnAskAi" onclick="askAi()">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2l2.09 6.26L20.18 10l-4.73 4.74 1.18 6.26L12 18l-4.63 3 1.18-6.26L3.82 10l6.09-1.74z"/>
      </svg>
      <span class="btn-label">Ask AI</span>
    </button>

    <button class="tool-btn mic" id="btnMic" onclick="toggleMic()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <span class="btn-label" id="micLabel">Mic</span>
    </button>

    <button class="tool-btn clear" id="btnClear" onclick="clearConversation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
      </svg>
      <span class="btn-label">Clear</span>
    </button>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    // ── State ─────────────────────────────────────────────────────────────────

    let ws              = null;
    let isConnected     = false;
    let micActive       = false;
    let audioCtx        = null;
    let mediaStream     = null;
    let workletNode     = null;
    let streamBuffer    = '';
    let streamEl        = null;   // current streaming AI message element
    let partialMsgEl    = null;   // partial transcript element
    let screenshotsCount = 0;
    let toastTimer      = null;
    let reconnectTimer  = null;

    // ── DOM refs ──────────────────────────────────────────────────────────────

    const messagesEl   = document.getElementById('messages');
    const statusPill   = document.getElementById('statusPill');
    const statusText   = document.getElementById('statusText');
    const btnMic       = document.getElementById('btnMic');
    const micLabel     = document.getElementById('micLabel');
    const ssBadge      = document.getElementById('ssBadge');
    const contextInput = document.getElementById('contextInput');
    const toastEl      = document.getElementById('toast');

    // ── Auto-resize textarea ──────────────────────────────────────────────────

    contextInput.addEventListener('input', () => {
      contextInput.style.height = 'auto';
      contextInput.style.height = Math.min(contextInput.scrollHeight, 100) + 'px';
    });

    contextInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askAi();
      }
    });

    // ── WebSocket connection ──────────────────────────────────────────────────

    function connect() {
      clearTimeout(reconnectTimer);

      try {
        ws = new WebSocket('ws://localhost:7823');
      } catch (err) {
        scheduleReconnect();
        return;
      }

      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        isConnected = true;
        statusPill.classList.add('connected');
        statusText.textContent = 'Connected';
      };

      ws.onclose = () => {
        isConnected = false;
        statusPill.classList.remove('connected');
        statusText.textContent = 'Reconnecting';
        if (micActive) doStopMic();
        scheduleReconnect();
      };

      ws.onerror = () => {
        // onclose fires after onerror, handles reconnect
      };

      ws.onmessage = (e) => {
        if (typeof e.data !== 'string') return;
        try {
          const { channel, data } = JSON.parse(e.data);
          handleEvent(channel, data || {});
        } catch (_) {}
      };
    }

    function scheduleReconnect() {
      reconnectTimer = setTimeout(connect, 3000);
    }

    // ── Event handler ─────────────────────────────────────────────────────────

    function handleEvent(channel, data) {
      switch (channel) {

        case 'connected':
          screenshotsCount = data.screenshotsCount || 0;
          updateBadge();
          addSysMsg(`Connected · ${screenshotsCount} screenshot(s) on file`);
          break;

        case 'screenshot-taken-stealth':
          screenshotsCount = data.count || 0;
          updateBadge();
          addSysMsg(`📸 Screenshot #${screenshotsCount} captured`);
          break;

        case 'ai-stream-start':
          streamBuffer = '';
          streamEl = addAiMsg('');
          streamEl.classList.add('streaming');
          break;

        case 'ai-stream-chunk':
          if (streamEl) {
            streamBuffer += (data.text || '');
            streamEl.querySelector('.msg-bubble').textContent = streamBuffer;
            scrollBottom();
          }
          break;

        case 'ai-stream-end':
          if (streamEl) {
            streamEl.classList.remove('streaming');
            streamEl = null;
          }
          break;

        case 'vosk-partial':
          updatePartial(data.text || '');
          break;

        case 'vosk-final': {
          clearPartial();
          const label = data.source === 'system' ? 'Host' : 'You (mic)';
          addTranscriptMsg(data.text || '', label);
          break;
        }

        case 'vosk-status':
          if (data.status === 'listening') {
            micLabel.textContent = 'Listening';
          } else if (data.status === 'loading') {
            micLabel.textContent = 'Connecting';
          } else if (data.status === 'stopped') {
            micLabel.textContent = 'Mic';
          }
          break;

        case 'vosk-stopped':
          doStopMic();
          break;

        case 'vosk-error':
          showToast(data.error || 'STT error', 'error');
          doStopMic();
          break;

        case 'clear-done':
          clearMessages();
          addSysMsg('💬 Conversation cleared');
          break;

        case 'error':
          showToast(data.message || 'Unknown error', 'error');
          break;
      }
    }

    // ── Send helpers ──────────────────────────────────────────────────────────

    function sendJson(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    // ── Actions ───────────────────────────────────────────────────────────────

    function takeScreenshot() {
      if (!isConnected) { showToast('Not connected', 'error'); return; }
      sendJson({ type: 'take-screenshot' });
    }

    function askAi() {
      if (!isConnected) { showToast('Not connected', 'error'); return; }
      const contextString = contextInput.value.trim();
      sendJson({ type: 'ask-ai', contextString });

      if (contextString) {
        addTranscriptMsg(contextString, 'You (typed)');
        contextInput.value = '';
        contextInput.style.height = 'auto';
      }
    }

    function clearConversation() {
      if (!isConnected) { showToast('Not connected', 'error'); return; }
      sendJson({ type: 'clear-conversation' });
    }

    function toggleMic() {
      if (micActive) {
        sendJson({ type: 'stop-mic' });
        doStopMic();
      } else {
        doStartMic();
      }
    }

    async function doStartMic() {
      if (!isConnected) { showToast('Not connected', 'error'); return; }

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

        // Request 16 kHz — browser resamples internally; AssemblyAI expects 16 kHz
        audioCtx = new AudioContext({ sampleRate: 16000 });
        await audioCtx.audioWorklet.addModule('/pcm-worklet.js');

        const source = audioCtx.createMediaStreamSource(mediaStream);
        workletNode  = new AudioWorkletNode(audioCtx, 'pcm-capture-processor');
        source.connect(workletNode);

        workletNode.port.onmessage = (e) => {
          // e.data is Float32Array; convert to Int16 PCM and send as binary
          const float32 = e.data;
          const int16   = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
          }
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(int16.buffer);
          }
        };

        sendJson({ type: 'start-mic' });
        micActive = true;
        btnMic.classList.add('active');
        micLabel.textContent = 'Mic On';
      } catch (err) {
        showToast(`Mic error: ${err.message}`, 'error');
        doStopMic();
      }
    }

    function doStopMic() {
      if (workletNode)  { workletNode.disconnect(); workletNode = null; }
      if (audioCtx)     { audioCtx.close().catch(() => {}); audioCtx = null; }
      if (mediaStream)  { mediaStream.getTracks().forEach((t) => t.stop()); mediaStream = null; }

      micActive = false;
      btnMic.classList.remove('active');
      micLabel.textContent = 'Mic';
    }

    // ── DOM helpers ───────────────────────────────────────────────────────────

    function addSysMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg center';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      el.appendChild(bubble);
      messagesEl.appendChild(el);
      scrollBottom();
      return el;
    }

    function addTranscriptMsg(text, label) {
      const el = document.createElement('div');
      el.className = 'msg left';

      const lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = label;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      el.appendChild(lbl);
      el.appendChild(bubble);
      messagesEl.appendChild(el);
      scrollBottom();
      return el;
    }

    function addAiMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg right';

      const lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = 'Open Cluely';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      el.appendChild(lbl);
      el.appendChild(bubble);
      messagesEl.appendChild(el);
      scrollBottom();
      return el;
    }

    function updatePartial(text) {
      if (!partialMsgEl) {
        partialMsgEl = document.createElement('div');
        partialMsgEl.className = 'msg left partial';
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        partialMsgEl.appendChild(bubble);
        messagesEl.appendChild(partialMsgEl);
      }
      partialMsgEl.querySelector('.msg-bubble').textContent = text;
      scrollBottom();
    }

    function clearPartial() {
      if (partialMsgEl) { partialMsgEl.remove(); partialMsgEl = null; }
    }

    function clearMessages() {
      messagesEl.innerHTML = '';
      partialMsgEl = null;
      streamEl     = null;
      streamBuffer = '';
      screenshotsCount = 0;
      updateBadge();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateBadge() {
      if (screenshotsCount > 0) {
        ssBadge.textContent = screenshotsCount;
        ssBadge.classList.add('show');
      } else {
        ssBadge.classList.remove('show');
      }
    }

    function showToast(msg, type = '') {
      toastEl.textContent = msg;
      toastEl.className   = `toast ${type}`;
      // force reflow to restart transition
      void toastEl.offsetWidth;
      toastEl.classList.add('show');

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, 3500);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────

    connect();
  </script>
</body>
</html>
